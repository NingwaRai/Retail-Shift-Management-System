{% extends "base.html" %}

{% block title %}Add Shift - ShiftFlow{% endblock %}
{% block header_title %}Add Shift{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h3>Schedule New Shift</h3>
    </div>
    
    {% if error %}
    <div style="background-color: rgba(244, 63, 94, 0.15); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: var(--border-radius); margin-bottom: 20px; font-size: 14px;">
        <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group form-group-full">
                <label class="form-label" for="employee_id">Assign Employee</label>
                <select class="form-control" name="employee_id" id="employee_id" required>
                    <option value="" disabled {% if not form_data or not form_data.employee_id %}selected{% endif %}>Select an employee...</option>
                    {% for e in employees %}
                    <option value="{{ e.employee_id }}" {% if form_data and form_data.employee_id|int == e.employee_id|int %}selected{% endif %}>{{ e.first_name }} {{ e.last_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="shift_date">Shift Date</label>
                <input class="form-control" type="date" name="shift_date" id="shift_date" value="{{ form_data.shift_date if form_data else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="start">Start Time</label>
                <input class="form-control" type="time" name="start" id="start" value="{{ form_data.start if form_data else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="end">End Time</label>
                <input class="form-control" type="time" name="end" id="end" value="{{ form_data.end if form_data else '' }}" required>
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="position">Required Position</label>
                <input class="form-control" name="position" id="position" placeholder="Sales Associate" value="{{ form_data.position if form_data else '' }}" required>
            </div>
        </div>
        <div class="form-actions">
            <a href="/shifts" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Shift</button>
        </div>
    </form>
</div>
{% endblock %}
