{% extends "base.html" %}

{% block title %}Edit Shift - ShiftFlow{% endblock %}
{% block header_title %}Edit Shift{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h3>Edit Scheduled Shift</h3>
    </div>
    
    {% if error %}
    <div style="background-color: rgba(244, 63, 94, 0.15); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: var(--border-radius); margin-bottom: 20px; font-size: 14px;">
        <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group form-group-full">
                <label class="form-label" for="employee_id">Assign Employee</label>
                <select class="form-control" name="employee_id" id="employee_id" required>
                    {% for e in employees %}
                    <option value="{{ e.employee_id }}" {% if e.employee_id|int == shift.employee_id|int %}selected{% endif %}>
                        {{ e.first_name }} {{ e.last_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="shift_date">Shift Date</label>
                <input class="form-control" type="date" name="shift_date" id="shift_date" value="{{ shift.shift_date }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="start">Start Time</label>
                <input class="form-control" type="time" name="start" id="start" value="{{ shift.start_time }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="end">End Time</label>
                <input class="form-control" type="time" name="end" id="end" value="{{ shift.end_time }}" required>
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="position">Required Position</label>
                <input class="form-control" name="position" id="position" value="{{ shift.position_required }}" required>
            </div>
        </div>
        <div class="form-actions">
            <a href="/shifts" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Update Shift</button>
        </div>
    </form>
</div>
{% endblock %}
