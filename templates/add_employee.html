{% extends "base.html" %}

{% block title %}Add Employee - ShiftFlow{% endblock %}
{% block header_title %}Add Employee{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h3>New Employee Profile</h3>
    </div>
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="first_name">First Name</label>
                <input class="form-control" name="first_name" id="first_name" placeholder="John" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="last_name">Last Name</label>
                <input class="form-control" name="last_name" id="last_name" placeholder="Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-control" name="phone" id="phone" placeholder="(555) 000-0000">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" name="email" id="email" placeholder="john.doe@example.com">
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="position">Position / Job Title</label>
                <input class="form-control" name="position" id="position" placeholder="Sales Associate" required>
            </div>
        </div>
        <div class="form-actions">
            <a href="/employees" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Employee</button>
        </div>
    </form>
</div>
{% endblock %}
