{% extends "base.html" %}

{% block title %}Edit Employee - ShiftFlow{% endblock %}
{% block header_title %}Edit Employee{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h3>Edit Employee Profile</h3>
    </div>
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="first_name">First Name</label>
                <input class="form-control" name="first_name" id="first_name" value="{{ employee.first_name }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="last_name">Last Name</label>
                <input class="form-control" name="last_name" id="last_name" value="{{ employee.last_name }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-control" name="phone" id="phone" value="{{ employee.phone }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" name="email" id="email" value="{{ employee.email }}">
            </div>
            <div class="form-group form-group-full">
                <label class="form-label" for="position">Position / Job Title</label>
                <input class="form-control" name="position" id="position" value="{{ employee.position }}" required>
            </div>
        </div>
        <div class="form-actions">
            <a href="/employees" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Update Profile</button>
        </div>
    </form>
</div>
{% endblock %}
